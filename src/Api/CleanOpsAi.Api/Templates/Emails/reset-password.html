<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OTP Code</title>
</head>
<body style="font-family: Arial, sans-serif; background-color:#f5f5f5; padding:20px;">
    <div style="max-width:500px; margin:auto; background:#ffffff; padding:20px; border-radius:8px;">
        <h2 style="color:#333;">Reset Password</h2>
        <p>Hi {{FULL_NAME}},</p>
        <p>We received a request to reset your password.</p>

        <div style="text-align:center; margin:30px 0;">
            <span style="font-size:32px; letter-spacing:5px; font-weight:bold; color:#2c3e50;">
                {{OTP_CODE}}
            </span>
        </div>

        <p>This OTP will expire in <b>5 minutes</b>.</p>

        <p style="color:red;"><b>Do not share this code with anyone.</b></p>

        <hr />
        <p style="font-size:12px; color:#888;">
            If you did not request this, please ignore this email.
        </p>
    </div>
</body>
</html>
